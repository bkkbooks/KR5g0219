body:
  text: 洞玄靈寳千真科亦五爾時太極左仙公以呉亦烏三年正月一日登勞盛山精思念道是日中時有地仙道士三十三人詣坐燒香儵爾之時乃有天鈞𠆸樂萬鍾樂作太上道君與諸聖衆天眞皇人扶乗千眞仙童玉女乗空履虚同時俱至變所居䖏床座莊嚴太上道君依位而坐仙公稽首伏地良乆言曰玄積劫有幸好道樂眞銜荷慈尊降此卑室千真集會喜慶難言沈迹下僚未由大悟不審人間居䖏道俗軌儀進退之誠伏希指示太上告曰子有功德宿著左仙暫託因縁寄生下世為物宗匠𦔳道弘宣乃命千真為說科戒千真唯唯伏受教言護命眞人乃說科曰科曰施制立法要假䏻行衆中無法者不問老㓜悉不得共住共住之人必湏同遵聖教動止合儀惡悉䏻斷善共保護如勸惡者事在別科科曰道法清虛不希名利閑居静室謂曰仙家我弟子中多畜錢財寳貨牛馬奴婢躭着不巳如此之人斷三寳原奪衆生眼䏻持経奉戒俱為滅法科曰大德名人同住一䖏有狡猾弟子苦欲歸依或愛情未離或枉威逼事不獲已各試機宜或先令苦使或誘引恬言或獨立坐忘或擯令逺去或出経寳教授令齋戒治除或懼自尊威而令傍人撫接若終惡不攺而無進善之功畜斯弟子是滅道法永湏逺離科曰若有弟子愛樂正法深経大義咸𩓑欲聞直以機在前縁衆根闇鈍如此之人善欲暨發可湏安慰三戒五戒示静安心大德法師是衆生模範若心性髙者而令低心下意若動止強梁而湏攝伏若其懦弱勸進勇猛既為衆生父母寜不慇懃必契道法永無退轉科曰出家之人䏻持三戒五戒九戒十戒乃至三百大戒等一戒之中各有二十四善神之所擁護天人供養不犯衆惡有不信戒衆惡故犯罪結𡨋陽却受生堕落盲道違戒奉戒得福獲罪不問道俗至理無偏其功等爾科曰上德尊人住持大衆下有小過須避嫌疑若有不和於國王妃嬪眷属大臣宰輔及俗人児女小道士浄人宿新惡嫌之人前並不得呵責若應舉罰先喚来隱處自以示語科曰不堪為衆所惡乃當白衆舉罰科曰出家之人務在簡静非法行事動則落邪非法者一則廣求利養自託我䏻二則貪積無窮為人婚姻卜相三則強稱多解䀡視天文四則行䓁浄人躬執稱稼五則闘亂大衆與惡友交㳺六則正法為事而與㓙俗結黨七則坐起無分混淆法次八則不依正道與俗同床九則闇夜出行而不炳炬自照十則樗櫟雙陸劫盗行非恣意所為而不自戒入道依衆可以矢之如不自懲是㓕道法科曰上淸法師不應授人大戒不應受人依止不得畜弟子不應為人教授不預評論衆事不得闇夜自行不得親近邪見當湏動止在法科曰諸小道士所請名德皆湏脩飾形儀整頓冠履安庠雅歩稽首三拜拜訖長跪啓白某甲小兆未備法敎故以逺来伏𩓑大德賜垂觧結我有所聞必無返逆大德為白衆今有某道士従小来心有結縁累不䏻自觧今稽首求悔若従生至今行嗔行怒行劫盗行貪慾一切不善之行於今觧釋不敢復犯進學正戒通明義理說竟謹依所說乃起更三拜而退科曰亂衆之人不依正法飲酒醉亂軽欺上下者罰錢及米或餘貨財當時同和後便違拒不肯輸送因兹杖罰或奪財帛以用供養或苦役治地斬伐草木鋤禾收刈如一衆不䏻治罰捴集道衆又不䏻治可送與國王以依俗律科曰若有不依正法逰入他觀妄有軽欺科索酒肉或媒嫁浄人賣買奴婢及餘畜産或造順俗之制犯罪囚禁遭赦得免或自貨財方便得脫或奪賊物因利求利律有正科依法與罪科曰住立道場皆湏衆食登齋應供十方共同撃磬鳴鐘名集法衆非是齋人不預斯食同建福善道俗無違恨客閉門衆所同醜或有問者食則有限客乃無違既不神通何䏻供給荅曰主客之人逓牙為作本供旣少客數又多聴可均分减口讓哺此是人情勿冝杜絶科曰道法平等不簡親踈亦貴賤同䖏一衆䕶惜無偏若人人作情来求輙與此不存衆衆即破攘也各宜慎之科曰若是齋時俗人来乞食者監厨之人即須借問䏻齋以否若䏻齋與食若不䏻齋深示因果使知罪福非為恡惜欲令返悟謹守道法是為第一慈悲若不示語衆生得罪科曰若齋食時有五事一先當取晷影二則鳴鐘集衆三則行水洗浄鋪巾列席四則打磬就食五則說先師食咒若不為此五事非入浄齋名為盗食科曰諸大衆人每用常料若先約三不可加减减為犯盗多取亦然若行食時菓葉巳上並不可長取若意貪長取此即犯盗若行食時上座湏量下座湏用多少不可過取昇玄経云上下共相頋望也科曰道衆威儀事在嚴整衣服清潔軌行可觀則生世善心諸天稱嘆若形儀踈慢不喜衆心不堪衆論毁辱道法即是道寳有虧斷大慈種若為衆儀軌人所欽慕逺玄教益隆法門有兾科曰若就齋戒儀軌大德之人應當前坐約語徒衆必使齋整勿使主人有所嫌鄙或各争異論無有畏忌非唯道俗賢善惡惡亦乃十方大聖冥鍳為罪招殃各因巳受科曰入衆坐起皆有法則若坐時男先上左脚正履近床次上右脚徐手拓床平身向後安坐若下床時亦徐手拓床近前取履先下左脚次下右脚安徐而起女前右脚坐起咸然若入堂時先於門外端衣笏正褐帔束身歛版存想堂中法衆如十方天尊如得道衆聖如見在國王如州縣府主等方始安庠進步科曰若入堂時有門兩頭東西門各隨左右入若門西坐者従門西入若東坐者可門東入不得於門上交過科曰道服中華之衣横裙大䄂與俗有别不得與白衣叅雜袍裘皮靴角柄食器皆湏𣾰素而巳不繁金銀銅器朝修行事禮謁衆聖皆盛儀服隨法位次若上清衣紫帶珮靈寳通黄三五衣絳非事時紬絹為衣荆槐色而巳不得紋綾羅錦炫惑時俗女官不得金玉釵釧花粧粉飾一則入道通惡二則非為正心科曰道士女官各湏浄行道士不得畜女童子女官不得畜男童子各便逺離栖肅其心目不見形聽不聞聲老子經云不見可欲使心不亂若有此色即湏白衆告舉不肯制止國王有法科曰大觀𥝠房皆多混亂特由尊者不䏻謹慎縦恣無方或是綱維不出教令身居寳地心穢慳貪導引後生同開惡趣㐫惡長養塞大道源使正信者慿心何所科曰共入寳方同開善趣懷嗔動煞咸乖大慈養牛畜馬不免鞭撻獵狗放猫專懷殺意今入浄戒此等並合戒之科曰人有尊卑戒無大小或身雖奉戒意無在法不脩浄舎詎飾殿堂招引㐫黨動為北法聞鳴鐘禮拜大𥬇入觀門見尊徳行道外生誹謗特由綱維自尓何䏻戮力徒衆逓牙作法風教日乖科曰若衆中有一人不善可隱䖏示語云真品仙階行人所踐道無形像要籍人和十方法徒助道揚化聞有法要學擬成身豈得過令他知覺今大德諸行無犯唯有其事不依正道請即攺之猶如月𧇊更滿蘭歇更薫幸相用言共臣法教不悛即舉白大衆科曰所養子弟彌加呵責有大罪過引五事責之一我今呵責汝汝湏出去二則出離之後莫入我房三從使無人誓不用汝四我之生前莫至我所五則寧引化三塗五道終不與汝共語此之呵責折伏為之甚矣不用分外非法拷打枷棒懸首反縳晝夜打罵律無此條傷大慈種若師主使令弟子酤酒買肉坐行販賣牧牛養馬并為邪媱驅使弟子弟子可言曰以此所作非天尊之行某不敢為師弟子若有嗔責可湏捨去科曰惡行弟子教不知悔其行有十一則為惡不恥二則見善不修三則聞諫彌甚四則動非威儀五則強梁我慢而無㳟肅六則夷情狠戾七則友非忠信八則逰習奸媱九則好樂屠戮十則醉亂尊卑有此十種行人是破道法若不為惡䏻伏勤苦清旦入房除穢清塵朝中日暮三時問訊求有所習隨用駈使不辭勞苦漸盈大器積徳成真有此弟子紹隆正法廣以讃嘆科曰出家之人與俗既别置觀立舍並不得與俗人及家口寄住若是十方法衆行往経過看前人徳行髙低作三品安置尊卑居止要合行所科曰毎觀舎應湏精思别院置名得平常集衆同在齋堂若是逺方行人来暫居止即湏先問欲何䖏居止其十方来人自量才徳請就居止若才德髙逺精思别院若無竒行請平常居止若自量卑弱請乞下房小室聴可以謙請不可過分若是上人讓請下人可須辭謝攺䖏若才非所䖏即須黜退科曰出家之人既䏻披黄戴青為相若䏻淵澄霜潔玉潤水清世世福田行無㸃汚守持正戒有五種譬喻一者如冨貴之家忽生一子而無兩目経渉三月兩目忽明衆家歡喜無戒之人猶如無目二者喻如磨鏡漸漸増明有戒之人念念功積三者喻如嬰児細細長大䏻持戒者以下之髙四者喻如飢人終念得食不得食故必死無疑不受戒人長輪盲道五者喻如航䏻度大海䏻持戒者必度生死苦海科曰若國王大臣施主工匠䏻有益衆者可供給飲食薪火有求索白衆給之科曰若威勢及惡賊䏻損害衆者亦湏供給飲食此是不善人䏻損壊法衆故也科曰常住財物不得貸借充𥝠房中用其有病患切急白衆求請後一陪填還科曰非法之物不得布施仙公曰何為非法之物真人曰牛馬奴婢軍械器杖等物並是也科曰時在饑荒又遭離亂各欲隨豊逐静䏻有守固者衆可分𥝠財物以與守固之人科曰法物造像造経有所施用軽重各别仙公曰何為法物什物経像等之䡖重真人曰鐘磬幡花爐合帳盖寳幢経緼之属此是法物則重冠履机笏褐被裙𥜗衫褶等為什物則䡖本心為重後作軽犯五刑律本作䡖今作重不犯像有三等天尊為上真人為中衆仙玄中法師等為下本心捨施造像為重不得入䡖入䡖犯十惡若以卑入尊不犯経亦然上清為大洞是大乗洞玄靈寳是中乗洞神三皇為小乘本心造大乘後為中下犯五刑律本心造小今造中大不犯科曰盜法物什物罪同五逆科曰將常住食飲以𥝠餉及歸𥝠者准盗論科曰常住之物十方共同逓㸦相付百代常行不可當時任意取用不得共制𥝠自用意分以歸𥝠並犯五逆罪科曰若母及姑姊妹等為病患及急難要須扶提者無犯若是他人児女𣳚水墮火縦有媱心亦湏拯救不得犯觸科曰出家之人單景獨宿與物不群割愛遺榮超然宴䖏若犯逐亂世不崇敬科曰若行住道路逢女人有所求覔并乞食飲等只得隔十歩外遥言若得物及飲食等安致地上或持去後任来取不得親授手中若路逢婦女湏避路與過呌曰居滛心起時如逢猛虎如見毒蛇想如見國王如為賊癈逢主想如坐在宅中宅被火發遺燒想如乗舡渡海舡漏欲𣳚想作此六心滛無起䖏科曰共居觀舎堂殿園林田地三寳衆有殿属天尊堂属道士若其營造尊卑有其𥝠房是道士自造廣狹等級岀自巳身死後身前由身䖏分若死後而無付嘱徒衆施為白衣童子自所營造得度之後配名則别者亦聴許自已䖏分唯地属三寳不得攺動若大衆先有别約衆例不犯科曰諸𥘉入道戒行未全依倚村坊不住觀舎上無尊德可畏下多狡猾為朋誘引児女同床坐起歌𥬇僖戯飲酒食肉俗人見之返生穢慢如此之𩔗是滅道法破他信敬尊徳巡察依科與罪設不䏻治國王有法科曰若出家之人將三寳之物贈遺官人豪勢内求潤巳翻令俗人生怖望心縦䏻興建不如浄坐如有犯者准盗物論科曰出家之人不交世俗不求名利不作有為功德静思入定降伏外魔名為浄戒是真實法母科曰出家之人清堂虚室躭着既甚有十惡累一則廣占荒野别畜田宅二則種植園林自求地利三則出入貯積絲綿糓帛四則畜販奴婢五則愛養六畜六則貪聚八珎七則樂玩八則銅餝帷帳九則衣著竒異十則財寳珎勤此之十事並不得為深宜攺革從道日新科曰若有人来乞索是因三寳起齋傳度講誦轉經受施但是因三寳得者准明真科依十二折傳䖏分看是此外所得听出意布施濟惠仍不得以不浄取以為不浄施皆犯枉法得罪科曰若諸弟子𢘆畏天寒時亂遭飢荒等事儲積絲綿絹布五糓以備時急惠施者不禁科曰若有人將器杖禽獸非法之物以惠施者並不合受科曰若有人將使人奴婢以供給者悉不合受其使人䏻齋菜持戒者可受科曰出家之人房舎與俗児女隣並者夜宿各須閉戸不閉犯律科曰出家之人寧受犯偷鐘盗像之罪不得言說他家隂𥝠穢惡之事科曰出家之人衣裳鞋履皆須整頓行動坐起語𥬇要須得莭若為疾病或威迫驚懼或被獸則趂逐被傷㓨舉足動歩及衣服違法者不犯非此等犯律有故為者犯律仙公問曰何為犯律何為犯科真人曰律無正犯而言犯律杖罪科無正犯而言犯科犯笞罪科曰若野地得蔵還與國王若蔵中有冡銘記記云是經像堂殿功德之物得者依其銘記䖏分施造不須白王若不尓犯十惡律如路次野中拾得之物捉取其物依物標榜得主分付如不得主人送常住不尓犯律科曰冬天洗浴每一旬一浴先作宻室方六尺安水槽火罏筒渠注湯水入其須桃枝栢葉蘭香竹葉等内籠濾湯至乃鳴厨下鼓尊卑以次入浴不得男女同室亦不得與俗人共浴及浴衣若不尓並犯律科曰出家之人不得飲酒或妄託天寒詐稱腹痛飲後色變或闘亂尊卑應供赴齋或施行章醮或行逰道路或應對公𥝠非惟自失禮義抑亦穢辱道衆是㓕道法無生弘讃然應人就請本以清潔為先出公入𥝠皆用端嚴為首有如此例皆犯律論其實是疾痛衆所通知分藥要須不在禁例須令出外不得入法席仙公曰道法之中聴許飲酒靈寳経云置酒浮雲觀髙飲玉清臺此何頓隔之真人曰何見之謬太清経云化金玉為三十六水以金為水則為金漿赤玉為水則為瓊漿白玉為水則為玉漿或玉液定志経云玉液五者不醉常思浄行何有許法科曰出家之人出外行逰見人闘打不孝父毋不順兄弟為偷盗行軍兵傷殺人事皆須歸觀香湯洗浴入静思㣲不尓犯科科曰齋時受食皆須浄手巾盛受科曰齋後須楊枝揩洗口齒科曰齋取時依立主法分二十四炁以定得失科曰小師若見大德及経像在背後者皆須侍衞不得違背科曰傳経度戒之時女官得入道士觀道土得入女官觀要須請師資位定白衆令知嚴整法戒不得一人自往聴將二人同行直入法堂更不得𥝠房混亂法事當日即出不得経宿不尓犯律科曰男女官各得依止男官依止男官女官依止女官大法者為師毎一旬至師所受教訓至時整理法服赤心靈宇㳟敬謹肅直詣師門不得東西異向至師門巳通問云某弟子問訊師知巳乃端嚴衣帔燒香於経誦之室命弟子進進至師前安詳三拜問訊云師比者起居安否德無損乎師無他故乃荅云亦無𧇊禮誦若有疾苦隨事應弟子若有罪過先聞師耳可云汝有某事可加戒誨令其攺隔弟子拜謝乃云不䏻自勵勞師戒勑又拜謝云從今以去不敢復犯若是齋前設齋齋後無所施設乃辭去𠕂拜願師以自珎重師重戒云所在之䖏勤行齋戒以自慎護勿起驕慢唯然即退三歩乃始轉去不得更入他房歸至本觀以師戒誨之言示衆大小不得蔵匿若女官無大法不觧傳授者可訪男官請受若有髙徳女官男官亦得詣請受法俯仰之格男女通用問曰道士女官而被俗人不依道理䡖凌若為依止荅曰若道士女官而為俗人不依道理䡖欺者告父母兄弟及村落有勢力者以為外護若道士女官有不是罪過可白徒衆徒衆依律治罪不受送與國王問曰天尊𥘉得成道聴許男子出家未審女人從何乃得入道荅曰天尊因樂浄信夫妻結果道成為元始因許男女通令出家妻以果地為金中候太夫人之稱亦許女人相係入道傳経度戒之後大洞女官見男子入道受老子自然法巳即須敬禮依法引接為䏻紹𨺚聖種若見有過垂心慰喻不得罵詈非謗若治籙童子須禮大洞女官為敬法故問曰男女童子依奉経戒王勑與度作何方法得度之後合禮父母以否荅曰紹𨺚聖種相係弘護男女入道揀取端正慈敏有道心者師先試練十行可軌聴許講習王勑與度依王法制應合度已依一大觀嚴整玄壇施安蘭繤依明真㧞罪之法預度男女於壇南依左右方面以别兩行倚立以監度官長正南横行須一大洞法師横行之前施案席然香讃嘆曰大聖天人尊歴代所崇敬今有珎貴者是我大國王以發慈善心普令入正道得入正道巳實由國王恩永離有為情長尋聖境界必得大法利同趣證無為讃嘆既巳白新度法師今日之後禮聖禮真永離親俗人各三禮長為俗别第一禮國王帝主徳澤無盡第二禮州縣官長度脫之恩第三禮存沒父母得與出家離俗三禮訖法師投新度一人衣冠曰大㢤聖化被無窮星宿為冠日月為服法天行道勿替四時廣度衆生永超三界法師令大衆普皆唱善彈指三聲舊人唱善彈指齊各三聲訖乃捴着法衣竟官人行香如法行道三周舊人在前引發壇嘆道事訖投齋齋竟各謝法徒從老起至下竟列坐父母兄弟皆来禮拜於児女邉父母並稱弟子發願之後師必定成道與弟子等同入正真問曰出家之後從少至老有何階級荅曰出家之人有五種階級從七𡻕至十一名蒲車道士十二至十四名駈邪道士十五至十九名趂施道士二十至六十名弘護道士七十至九十名住持道士問曰三乗之道何以為心荅曰一小乗之人隱䖏山林自調自愛二中乗之人徳澤弘深後䏻兼濟度物三大乗之人忘功絶𥝠發弘誓願科曰能勸他人男女并捨自子出家譬如㣲塵世界之數功徳亦不如勸人捨子䓁出家之功徳縦有人造幡造盖懸至三清之境功德亦不如勸人出家之功德科曰道俗二徒造於経像俗人仰之以金木銅綵模冩聖儀安心供養名為造像科曰若有信敬捨施田宅園林為人侵奪請報本施主令其轉貨科曰出家之人與俗有别然而死病亦無定法然稍修軌制病之時轉讀然香晝夜不絶臨打無常磬送終依五練生尸法失以病疾觀内大衆數以存問檢校厨下令前與病人食疾病之時難有逹命福勢既盡乃欲隠避東西此並是前路功德無慿而以臨時驚懼作此意速死而巳可以浄洒掃開敞房舎来徃善知識逹命之言更相啓發請法無常寧有住者必應夀盡量命無機可移入遷化堂其堂可於觀西北角别立為院堂三間五架堂面看西北其堂中髙座上造昇虚像身坐蓮花如人大舉左手以指天門左右二真俠侍病人恐命將絶移入堂中像座後安置用黄紋全幅為幡長二丈四尺尖繫左真腰幡頭與病人手投令病人直心正念𩓑隨二真登天門詣金闕若未應化隨䢖福田男向左真女向右真一人入此堂難得平然歸者臨命將絶咸稱未困特是貪生有此計耳逹命君子豈去住為心科曰出外行逰湏思量結覔好伴當有十可觀一擇覔知巳二要須正見三心心相得四疾苦相憂五逓樂相師六威儀勿失七行動檢攝八所見鞠躬九禮敬盡節十進退合儀可同行也科曰道學法徒速来客依不問大小各湏安置先與房舎次給所湏三令隨衆朝拜四教示門中諱忌五語去䖏避就科曰清信俗人欲入觀舎觀齋聽法請㑹供養者並須清浄不染薫辛酒氣嚴整衣服結束卑㳟歛身下意先禮天尊次拜大德後小戒道士既入門通當崇敬若是日日齋講𢘆在二時須来者直於禮座禮天尊即以安坐其善女人来者亦准此不得語𥬇倡蕩脂粉圖飭粧眉𥁞面常須執志整容觀听妙法捨香發𩓑同契成道科曰俗人入觀寄宿不得眠坐常卧之床得坐居客别床眠時不得脫衣露體科曰恩德大者無過孝順父母師主親自供養温良無失此恩㝡大又䏻勸課令人作善其功等比若父母貧老疾病死亡無可以充衣食湯藥茶餅者得供營送若父母不敬信三寳者怡顔勸喻令得法利問曰俗人欲齋戒者何為教示荅曰若欲入齊者可以一日八日十五日二十八日二十九日六齊日示之若䏻進又以一日十四日十五日二十三四二十四日二十八日二十九日以八齋日示之若又䏻進以一日八日十四日十五日十八日二十三日二十四二十八日二十九日三十日十直齋日示之若又䏻進即以正月七月十月三元齋示之若又䏻進即以正月三月五月七月九月十一月𡻕中六齋月示之若欲齋人先令受戒戒之所起三業為𥘉身業有三殺盜邪滛口業有四妄言綺語兩舌惡罵意則有三貪嗔癡此之十戒由三業根先濆防之問日齋食若為吹第荅曰若自居常齋厨下監厨一人先自檢校厨頭菓菜調和生熟顔色氣味並令得所次看日時圭影天隂取漏刻以正齋時時鳴鐘召食各送食器於齋堂量坐䖏位次安置歛鐘訖行道讃嘆竟各坐定已水一遍次行食中始就食尊卑得序前下先師柈監厨人長跪擎柈於先師座前莭衆人座頭鳴磬子一下座頭大德咒曰䢖齋為道真為道種道父道母真人神人仙人聖人或同為道同共飲食長生无極竟拌下先師前次下齋人食仾聲各唱菓苿飲食名示衆齋人各捧器物盛受若不湏者勿取大德顧望看食通至下周遍竟乃令嗚磬子一下云請就食大衆安庠正坐无語无𥬇以就食食時示不鳴唇亦不㗘口亦無歠欱之聲亦無咯唾亦無呻聲吐氣亦無驚匙打筯上座緩食相待行食之時事事三遍行上次下第行食訖從下收上行食時至是時應受非時不得輙索齋欲了歛取衆生飯散與衆生非監厨人不得向厨下有所科索飯食来不及齋即湏下堂食若強入齋堂即名觸食衆食未了食飽輙起即名驚座衆若自居長齋無先師柈即无先師咒即有出衆生飯咒食了行飲一遍次行水一遍各收食噐竟鳴磬子一下唱曰齋食以竟各隨意下息大徳乃以捧食噐出堂歸房盥漱監厨人檢校厨下不得一人不出若犯前一條者對衆各罰二十拜若應俗人齋供坐起受食並同唯受菓不得不受俗人恐生揀擇之意但受之食竟餘菓食並靣前莭衆人鳴磬子一下唱白大衆齋餘長食充主人無碍用同者嘿然不同者說三唱訖齋官或有父母師主老病得取此餘菓即起白云某甲有父母師主老病今將某菓歸家餉餽上座大徳荅云好將去若不此者並令主人收充家中無碍用或問曰齋時合出衆生餘否荅曰棄賢世界𥘉開元始命行道真人下敎為遍嘗百草以得五榖活扵人命一切餓鬼無種植功扵齋之次各出飯七粒真人徳施與一切衆生亦名神農飯亦名衆生飯一切衆生得此飯一粒能飽千日科曰出家人行動語𥬇並避譏嫌入法之人不得言殺心殺不得言奸起奸不得言盗起盗𦆵非正法並須隱避科曰聖人去代衆生戀慕可以駐心發衆生敬信堂造堂殿宮闕䑓榭施置雕𩛙造十方天尊真仙聖衆或金或銅或鐵泥木圖畫隨力能辨幡花伎樂種種供養若以日月増久䖝䑕侵傷鳥糞穢汚牛馬衝突遂致毀壊能有敬信身手治理或顧借工匠洗餝安置猶勝前人𥘉造功徳何以故重發人敬信又續前人基址故也科曰朝晡禮拜三寳得於禮拜板上若行道時得於地鋪席上若於路相逢無席得於地上如地上禮時手至地得屈指指背着地不使塵汚掌心名為護浄若為髙廣大床平床長床方床上禮拜者並不合儀深乖崇敬譬如見世間髙貴尚當進退合節何况謁聖朝真而於床上啓白𡨋考一百日科曰尊像之前即是奉真承聖對俗間官長尚乃不敢低頓豈况朝謁八真七聖而以倨傲形容或大語髙聲或更相𧇊𣏣或攘怒眼或仰卧斜身並以結罪𡨋科亦大為俗人不生敬信科曰齋戒之家未至一日先於門前竪一長竿懸十絶大幡標門戸示絶浮好以存閉靜科曰出家之人常合忠正出入動止以正為先一正巳身二正門徒子弟三正觀中良賤四正四逺法衆五正頑為俗人能正巳身為物軌則能正弟子承禀有儀能正觀中大小從順䏻正四逺法義稱揚能正頑為廣増惠觧能如此者名為道士若身旣不正為物所憎弟子不敬却賤師主觀中常無禁忌大小貴賤混淆不存信義四逺同皆厭惡欺淩愚蔽増長罪田不能廣立威恩却更誘引他家子弟奴婢或啚物入己或𥝠與交關不依正義在身𢘆以邪僻為行有如此色逃課㐫賊共所防戒如不受懲國王有法科曰出家之人還歸俗家若有父母可歸父母之堂别床安置不得與俗人共床坐若父母有疾聴得扶持看侍若無父母可進客堂安慰大小並不得嗔聲大語及俗間戯𠯴哂𥬇叅雜男女経宿居停並犯戒律科曰若退一紀即退三百日若减十筭减十日科曰叅省師主大徳皆三拜侍立命坐即拜而坐更問他故則起立而荅皆條直身體並脚歛手科曰為弟子洒掃之禮必加箒於箕上两手捧接腋下而来次有五事一則歛塵掃時以袂拘而却二則滅跡勿使有於痕跡不浄於惡三則不背長者勿生不敬四則除糞箕自向五則掃箒還故䖏不尓犯科科曰為弟子之禮師主令過授物事師主若立則倚授師主若坐則長跪授科曰進尊者之房戸知在房中或庫内若不聞聲咳發覺如不聞退若問稱名啓白命入則入房開則開戸閉則閉入戸正視尊者左右斜顧犯科科曰為弟子之禮師主有客當即拂拭床席枕褥洒掃前後訖白師主師主令命客進乃命客進科曰弟子有所啓白得主及同觀外觀大德皆整衣至房房閉當屈指細細打戸三過停少時不聞人聲又三過合九過不聞人聲則退科曰師主大德若從逺歸命所使先到觀中令知歸至弟子則整衣帔出觀迎接當以大顧望不得無故掩人不俻科曰若於道路逢見得主及師知故皆以下風避影不隔越道路而與共言當以曲腰磬拆有言則對無言則退科曰隨從尊者出入當為提持机杖鞋履登危臨𡽗當以親侍左右兩手提携不得散手逺離老少别用科曰夫為弟子之禮出則啓白還則慰問問訊上下乃復常業科曰衆有疑惑我不勸成衆有評論我所審察衆有擅造我從衆冝衆有行逰我不矯俗自常卑退尊敬於前人科曰為師主大德存衆之法寛宏以立節容物慈愛以約衆行事以㳟勤朝修以肅敬上乃均平不生異心下無怨色斯為大徳者矣科曰為人自已有善行當與在下共之勿自取歸巳科曰學道者不發他人過不揚巳之能不拒人之諌不見巳之怨科曰行道時齋主禮三寳訖投香爐拱手長跪法師之前法師三揲香咒曰當願主人七世父母得出長夜身覩光明灾消福降生死昇仙訖乃行香科曰自臨中食時咒曰二玄上道四極清泠太乙帝君百神黄寧受粮三宫灌漑脾靈上饗太和飡味五聲魂胎之命七液流停百關通和五蔵華明雙皇合景飛行上清科曰為人齋出飯咒曰今日是吉日齋戒向太上中食天行厨主人福無量科曰下先師飯咒曰䢖齋為道真為道種道父道母真人神人仙人聖人或共為道同共飯食長生無極科曰出衆生飯咒曰勤脩大道法精誠感太𡨋真降魔魅散衆妖皆滅形七祖生南宫兆身登上清福旣無不普法食施衆生科曰服糜咒曰今日清浄服食仙粮行香吃粥夀命延長又曰乹元亨利貞身為大法王糜粥入腹五臓清凉漱口咒曰楊枝捶口眼明好願得一枝供大道道在一𣗳多名香𩓑將身心奉三寳科曰出家同道與俗有乖是我法徒共相掩蔽匿惡舉善逓互生恩使逺近稱揚通令深信論云天下善人少不善人多今時之人吹毛覔瑕互相𦆵嫉不知己過強毀他非設有一善争相毀謗不能攺身就善乃𣣔敗善同惡故壊道法專由此人大德尊者深所約語科曰盗造像物罪同十惡若盗將他家相縁路告訖又取物入已被八門長考萬劫無出科曰盗十方齋供衆物或為頭首𥝠自入己入火坑獄萬刦方出更入鄷都六十年考長為餓鬼科曰若有惡口赤舌㐫徒惡黨以相羣聚常懷逺離設使偶㑹情不獲已須要口順心若不能行灾為切害科曰凡人為道威儀不足皆為犯科以此示子子明審之仙公奉科稽首而退洞玄靈寳千真科
